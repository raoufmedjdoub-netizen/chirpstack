# chirpstack/chirpstack.toml

[logging]
level = "info"

[postgresql]
dsn = "postgres://chirpstack:change_me_strong@postgres/chirpstack?sslmode=disable"

[redis]
servers = ["redis://redis:6379/"]
cluster = false

[network]
net_id = "000000"
enabled_regions = ["eu868"]

[api]
bind = "0.0.0.0:8080"
secret = "uzuMDt2hKI9TEvtYNWxRhzWyHeLrQB6FUpRUhgYW4kw="

[integration]
enabled = ["mqtt"]

[integration.mqtt]
server = "tcp://mrc-agrix-chirpstack-server-anjwhl-mosquitto-1:1883"
json = true
qos = 0
clean_session = false
keep_alive_interval = "30s"
client_id = "chirpstack-app"

[gateway]
  [gateway.backend]
    [gateway.backend.mqtt]
    server = "tcp://mrc-agrix-chirpstack-server-anjwhl-mosquitto-1:1883"
    qos = 0
    clean_session = false
    client_id = "chirpstack-gw"
    
# Force gateway backend MQTT (alt syntax for some ChirpStack versions)
[gateway.backend]
type = "mqtt"

[gateway.backend.mqtt]
server = "tcp://mosquitto:1883"
